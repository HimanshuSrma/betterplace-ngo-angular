<section class="section pt-12">
  <div class="container-x grid gap-12 md:grid-cols-12">
    <div class="md:col-span-6">
      <span class="eyebrow">Get in touch</span>
      <h1 appSplitText class="heading-xl mt-4 text-5xl md:text-7xl">
        Let’s build a <span class="grad-text">better place</span>.
      </h1>
      <p appReveal class="mt-6 text-muted max-w-md text-lg leading-relaxed">
        Volunteer at an event. Donate. Or partner with us on a long-term initiative. Drop your
        details - we’ll get back within a working day.
      </p>

      <div appReveal class="mt-10 space-y-5">
        <div class="flex gap-4 items-start">
          <div class="grid h-11 w-11 place-items-center rounded-2xl bg-accent-500/15 text-accent-400">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <p class="text-xs uppercase tracking-[0.25em] text-muted">Based in</p>
            <p class="font-display text-xl">Gurugram, India</p>
          </div>
        </div>
        <div class="flex gap-4 items-start">
          <div class="grid h-11 w-11 place-items-center rounded-2xl bg-brand-500/15 text-brand-400">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          </div>
          <div>
            <p class="text-xs uppercase tracking-[0.25em] text-muted">Email</p>
            <a href="mailto:betterplacengo@gmail.com" class="font-display text-xl hover:text-accent-400">betterplacengo&#64;gmail.com</a>
          </div>
        </div>
        <div class="flex gap-4 items-start">
          <div class="grid h-11 w-11 place-items-center rounded-2xl bg-accent-500/15 text-accent-400">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.5 13.5A8.38 8.38 0 1 1 10.5 3.5a8.38 8.38 0 0 1 10 10z"/></svg>
          </div>
          <div>
            <p class="text-xs uppercase tracking-[0.25em] text-muted">WhatsApp</p>
            <a href="https://wa.me/918168110672" target="_blank" rel="noopener" class="font-display text-xl hover:text-accent-400">Message us</a>
          </div>
        </div>
      </div>
    </div>

    <div appReveal class="md:col-span-6">
      <form [formGroup]="form" (ngSubmit)="submit()" class="glass rounded-3xl p-8 space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <label class="block">
            <span class="text-xs uppercase tracking-[0.2em] text-muted">Name</span>
            <input formControlName="name" class="mt-2 w-full rounded-2xl border border-soft bg-transparent px-4 py-3 outline-none focus:border-accent-500 transition" placeholder="Your name" />
            <p *ngIf="form.get('name')?.touched && form.get('name')?.hasError('required')" class="mt-1 text-xs text-red-400">Name is required.</p>
          </label>
          <label class="block">
            <span class="text-xs uppercase tracking-[0.2em] text-muted">Mobile</span>
            <input formControlName="number" class="mt-2 w-full rounded-2xl border border-soft bg-transparent px-4 py-3 outline-none focus:border-accent-500 transition" placeholder="+91 9876543210" />
            <p *ngIf="form.get('number')?.touched && form.get('number')?.hasError('required')" class="mt-1 text-xs text-red-400">Mobile number is required.</p>
          </label>
          <label class="block">
            <span class="text-xs uppercase tracking-[0.2em] text-muted">Occupation</span>
            <input formControlName="occupation" class="mt-2 w-full rounded-2xl border border-soft bg-transparent px-4 py-3 outline-none focus:border-accent-500 transition" placeholder="What do you do?" />
          </label>
          <label class="block">
            <span class="text-xs uppercase tracking-[0.2em] text-muted">Amount (optional)</span>
            <input formControlName="amount" class="mt-2 w-full rounded-2xl border border-soft bg-transparent px-4 py-3 outline-none focus:border-accent-500 transition" placeholder="₹ amount" />
          </label>
        </div>
        <label class="block">
          <span class="text-xs uppercase tracking-[0.2em] text-muted">Message</span>
          <textarea formControlName="message" rows="4" class="mt-2 w-full rounded-2xl border border-soft bg-transparent px-4 py-3 outline-none focus:border-accent-500 transition resize-none" placeholder="Tell us how you’d like to help…"></textarea>
        </label>
        <button appMagnetic [disabled]="sending" class="btn-primary w-full justify-center">
          {{ sending ? 'Sending…' : sent ? 'Thank you ❤' : 'Send message' }}
        </button>
        <p *ngIf="error" class="text-xs text-red-400">{{ error }}</p>
      </form>
    </div>
  </div>
</section>
