<section class="section pt-12">
  <div class="container-x">
    <span class="eyebrow">Stories from the field</span>
    <h1 appSplitText class="heading-xl mt-4 text-5xl md:text-8xl">
      Field <span class="grad-text">notes</span>.
    </h1>

    <div appReveal class="mt-10 flex gap-3 items-center max-w-xl">
      <input
        [(ngModel)]="query"
        name="q"
        (ngModelChange)="query = $event"
        placeholder="Search stories…"
        class="w-full rounded-full border border-soft bg-transparent px-5 py-3 outline-none focus:border-accent-500 transition" />
      <span class="text-sm text-muted hidden sm:block">{{ filtered().length }} stories</span>
    </div>
  </div>
</section>

<section class="pb-24">
  <div class="container-x">
    <div appReveal [revealChildren]="'article'" [revealStagger]="0.1" class="grid gap-10 md:grid-cols-2">
      <article *ngFor="let p of filtered(); let first = first" class="group">
        <a [routerLink]="['/blog', p.slug]" class="block">
          <figure class="relative overflow-hidden rounded-3xl" [ngClass]="first ? 'aspect-[16/10]' : 'aspect-[4/5]'">
            <img [src]="p.cover" [alt]="p.title" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy" />
          </figure>
          <div class="mt-5 flex flex-wrap items-center gap-2 text-xs uppercase tracking-[0.2em] text-muted">
            <span *ngFor="let t of p.tags" class="rounded-full border border-soft px-2 py-1">{{ t }}</span>
            <span class="opacity-50">·</span>
            <time>{{ p.date }}</time>
          </div>
          <h3 class="mt-3 font-display text-2xl md:text-3xl leading-snug group-hover:text-accent-400 transition-colors">{{ p.title }}</h3>
          <p class="mt-2 text-muted line-clamp-3 max-w-prose">{{ p.excerpt }}</p>
        </a>
      </article>
    </div>
  </div>
</section>
